<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Приватна форма відгуку для клієнтів Amigo після завершення проєкту.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#090d12">
  <title>Залишити відгук | Amigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="/assets/amigo-logo.png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <link rel="icon" type="image/png" href="/assets/favicon-32.png?v=2" sizes="32x32">
  <link rel="icon" type="image/png" href="/assets/favicon-192.png?v=2" sizes="192x192">
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png?v=2" sizes="180x180">
  <script src="/script.js" defer></script>
</head>

<body data-page="review" data-language="uk">
    <!-- @include header-uk.html -->

  <main id="main">
    <div id="top"></div>
    <section class="page-hero">
      <div class="grid-mask" aria-hidden="true"></div>
      <div class="container page-hero-inner reveal">
        <p class="eyebrow">Відгук клієнта</p>
        <h1>Залишити відгук</h1>
        <p>Ця форма призначена для клієнтів Amigo після завершення проєкту. Відгук буде перевірений перед публікацією.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="contact-card contact-form review-form-card reveal" novalidate data-language="uk" data-success="Дякуємо за відгук. Він буде перевірений перед публікацією." data-error="Не вдалося надіслати відгук. Спробуйте ще раз або напишіть напряму." data-sending="Надсилаємо відгук...">
          <div class="form-heading">
            <h2>Залишити відгук</h2>
            <p>Ми публікуємо відгуки тільки після дозволу клієнта та модерації.</p>
          </div>
          <div class="field-row">
            <label><span>Ваше імʼя</span><input type="text" name="name" autocomplete="name" required minlength="2" maxlength="80"><small class="field-error" data-error-for="name"></small></label>
            <label><span>Компанія</span><input type="text" name="company" required minlength="2" maxlength="120"><small class="field-error" data-error-for="company"></small></label>
          </div>
          <div class="field-row">
            <label><span>Назва проєкту</span><input type="text" name="projectName" required minlength="2" maxlength="120"><small class="field-error" data-error-for="projectName"></small></label>
            <label><span>Тип проєкту</span><input type="text" name="projectType" required minlength="2" maxlength="120" placeholder="Landing Page"><small class="field-error" data-error-for="projectType"></small></label>
          </div>
          <div class="field-row">
            <label><span>Посилання на сайт</span><input type="url" name="websiteUrl" required maxlength="240" placeholder="https://"><small class="field-error" data-error-for="websiteUrl"></small></label>
            <label><span>Оцінка</span><select name="rating"><option value="">Без оцінки</option><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><small class="field-error" aria-hidden="true"></small></label>
          </div>
          <label>
            <span class="field-label-line"><span>Текст відгуку</span><span class="field-counter" data-counter>0/1000</span></span>
            <textarea name="reviewText" rows="7" required minlength="30" maxlength="1000"></textarea>
            <small class="field-error" data-error-for="reviewText"></small>
          </label>
          <label class="checkbox-field">
            <input type="checkbox" name="permissionToPublish" required>
            <span>Я дозволяю опублікувати цей відгук на сайті Amigo</span>
            <small class="field-error" data-error-for="permissionToPublish"></small>
          </label>
          <input type="hidden" name="formType" value="review">
          <input type="hidden" name="language" value="uk">
          <input type="hidden" name="sourcePage" value="">
          <input type="text" name="website" class="form-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAADgXp5W-mlnPn-ya"></div>
          <button type="submit" class="button button-green button-large form-button"><span>Надіслати відгук</span><i data-lucide="send-horizontal" class="icon"></i></button>
          <p class="form-status hidden" role="status"></p>
        </form>
      </div>
    </section>
  </main>

    <!-- @include footer-uk.html -->

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
