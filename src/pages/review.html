<!DOCTYPE html>
<html lang="pl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Prywatny formularz opinii dla klientów Amigo po zakończeniu projektu.">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#090d12">
  <title>Zostaw opinię | Amigo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="/assets/amigo-logo.png">
  <link rel="stylesheet" href="/styles.css">
  <link rel="icon" href="/favicon.ico?v=2" sizes="any">
  <link rel="icon" type="image/png" href="/assets/favicon-32.png?v=2" sizes="32x32">
  <link rel="icon" type="image/png" href="/assets/favicon-192.png?v=2" sizes="192x192">
  <link rel="shortcut icon" href="/favicon.ico?v=2" type="image/x-icon">
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png?v=2" sizes="180x180">
  <script src="/script.js" defer></script>
</head>

<body data-page="review" data-language="pl">
    <!-- @include header-pl.html -->

  <main id="main">
    <div id="top"></div>
    <section class="page-hero">
      <div class="grid-mask" aria-hidden="true"></div>
      <div class="container page-hero-inner reveal">
        <p class="eyebrow">Opinia klienta</p>
        <h1>Zostaw opinię</h1>
        <p>Ten formularz jest przeznaczony dla klientów Amigo po zakończeniu projektu. Opinia zostanie sprawdzona przed publikacją.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <form class="contact-card contact-form review-form-card reveal" novalidate data-language="pl" data-success="Dziękujemy za opinię. Zostanie sprawdzona przed publikacją." data-error="Nie udało się wysłać opinii. Spróbuj ponownie albo napisz bezpośrednio." data-sending="Wysyłamy opinię...">
          <div class="form-heading">
            <h2>Zostaw opinię</h2>
            <p>Publikujemy tylko opinie po zgodzie klienta i po moderacji.</p>
          </div>
          <div class="field-row">
            <label><span>Imię</span><input type="text" name="name" autocomplete="name" required minlength="2" maxlength="80"><small class="field-error" data-error-for="name"></small></label>
            <label><span>Firma</span><input type="text" name="company" required minlength="2" maxlength="120"><small class="field-error" data-error-for="company"></small></label>
          </div>
          <div class="field-row">
            <label><span>Nazwa projektu</span><input type="text" name="projectName" required minlength="2" maxlength="120"><small class="field-error" data-error-for="projectName"></small></label>
            <label><span>Typ projektu</span><input type="text" name="projectType" required minlength="2" maxlength="120" placeholder="Landing Page"><small class="field-error" data-error-for="projectType"></small></label>
          </div>
          <div class="field-row">
            <label><span>Link do strony</span><input type="url" name="websiteUrl" required maxlength="240" placeholder="https://"><small class="field-error" data-error-for="websiteUrl"></small></label>
            <label><span>Ocena</span><select name="rating"><option value="">Bez oceny</option><option>5</option><option>4</option><option>3</option><option>2</option><option>1</option></select><small class="field-error" aria-hidden="true"></small></label>
          </div>
          <label>
            <span class="field-label-line"><span>Treść opinii</span><span class="field-counter" data-counter>0/1000</span></span>
            <textarea name="reviewText" rows="7" required minlength="30" maxlength="1000"></textarea>
            <small class="field-error" data-error-for="reviewText"></small>
          </label>
          <label class="checkbox-field">
            <input type="checkbox" name="permissionToPublish" required>
            <span>Wyrażam zgodę na publikację opinii wraz z moim imieniem, nazwą firmy, nazwą projektu i linkiem do strony, jeśli zostały podane.</span>
            <small class="field-error" data-error-for="permissionToPublish"></small>
          </label>
          <input type="hidden" name="formType" value="review">
          <input type="hidden" name="language" value="pl">
          <input type="hidden" name="sourcePage" value="">
          <input type="text" name="website" class="form-honeypot" tabindex="-1" autocomplete="off" aria-hidden="true">
          <div class="cf-turnstile" data-sitekey="0x4AAAAAADgXp5W-mlnPn-ya"></div>
          <button type="submit" class="button button-green button-large form-button"><span>Wyślij opinię</span><i data-lucide="send-horizontal" class="icon"></i></button>
          <p class="form-status hidden" role="status"></p>
        </form>
      </div>
    </section>
  </main>

    <!-- @include footer-pl.html -->

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</body>
</html>
